      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {

      padding: 2.5rem 2rem;
      text-align: center;
    }

      margin-bottom: 2rem;
    }

    .download-label {

      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #737373;
      margin-bottom: 1rem;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.125rem;
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e5e5e5;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: #222;
      border-color: #404040;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      fill: currentColor;
    }
  </style>
</head>
